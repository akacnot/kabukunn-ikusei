<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>かぶくん育成ゲーム</title>
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <div id="app" class="app-shell">
      <main class="phone-frame" aria-live="polite">
        <section id="titleScreen" class="screen screen-title is-active">
          <div class="title-cloud cloud-a"></div>
          <div class="title-cloud cloud-b"></div>
          <img id="titleKabuImage" class="hero-kabu" src="./assets/images/kabukun-placeholder.svg" alt="かぶくん" />
          <p class="title-kicker">LINE LIFF 育成ゲーム</p>
          <h1>かぶくん</h1>
          <p class="title-copy">ごはんをあげて、ミッションをこなして、かわいい毎日を育てよう。</p>
          <div class="title-actions">
            <button class="primary-btn" data-route="game">はじめる</button>
            <button class="secondary-btn" data-route="howto">遊び方</button>
            <button class="ghost-btn" data-action="show-preparing">利用規約・プライバシーポリシー</button>
          </div>
        </section>

        <section id="howtoScreen" class="screen">
          <header class="simple-header">
            <button class="icon-btn" data-route="title" aria-label="タイトルへ戻る">🏠</button>
            <h2>遊び方</h2>
          </header>
          <div class="content-stack">
            <article class="info-panel">
              <h3>かぶくんのお世話</h3>
              <p>ショップでえさを買い、ゲーム画面でごはんをあげると、かぶくんがよろこびます。</p>
            </article>
            <article class="info-panel">
              <h3>ミニゲーム</h3>
              <p>「かぶキャッチ」で落ちてくるコインを集めると、結果に応じてコインを獲得できます。</p>
            </article>
            <article class="info-panel">
              <h3>写真の差し替え</h3>
              <p>「写真をえらぶ」から、自分で作った画像をかぶくんとして表示できます。</p>
            </article>
          </div>
        </section>

        <section id="gameScreen" class="screen screen-game">
          <header class="hud">
            <button class="icon-btn glass" data-route="title" aria-label="タイトルへ戻る">🏠</button>
            <div class="coin-pill" aria-label="現在のコイン枚数">
              <img class="coin-icon" data-ui-image="coinIcon" alt="" />
              <span id="coinCount">0</span>
            </div>
          </header>

          <div class="playfield">
            <div class="sun"></div>
            <img id="roomImage" class="room-bg" src="./assets/images/room-placeholder.svg" alt="" />
            <button id="kabukunButton" class="kabukun-stage" aria-label="かぶくんにごはんをあげる">
              <img id="kabukunImage" src="./assets/images/kabukun-placeholder.svg" alt="かぶくん" />
              <span id="moodBubble" class="mood-bubble">おなかすいた</span>
            </button>
          </div>

          <section class="status-board">
            <div>
              <span class="status-label">なかよし</span>
              <strong id="friendshipValue">1</strong>
            </div>
            <div>
              <span class="status-label">えさ</span>
              <strong><span id="foodCount">0</span>こ</strong>
            </div>
            <button id="feedButton" class="feed-btn">ごはんをあげる</button>
            <button id="minigameButton" class="minigame-btn">かぶキャッチで稼ぐ</button>
            <button id="earnButton" class="earn-btn">おてつだいでコインをもらう</button>
            <button id="photoButton" class="photo-btn">写真をえらぶ</button>
            <input id="photoInput" class="visually-hidden" type="file" accept="image/*" />
          </section>

          <nav class="bottom-nav" aria-label="メニュー">
            <button class="nav-btn image-only" data-modal="shop" aria-label="ショップ">
              <img data-ui-image="shopIcon" alt="" />
            </button>
            <button class="nav-btn image-only" data-modal="missions" aria-label="ミッション">
              <img data-ui-image="missionIcon" alt="" />
            </button>
          </nav>
        </section>
      </main>

      <div id="modalLayer" class="modal-layer" aria-hidden="true">
        <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
          <header class="modal-header">
            <h2 id="modalTitle"></h2>
            <button id="closeModal" class="icon-btn" aria-label="閉じる">×</button>
          </header>
          <div id="modalBody" class="modal-body"></div>
        </div>
      </div>

      <div id="toast" class="toast" role="status"></div>
    </div>

    <script src="./js/config.js"></script>
    <script src="./js/state.js"></script>
    <script src="./js/app.js"></script>
  </body>
</html>
