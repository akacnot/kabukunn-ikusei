<!DOCTYPE html>

<title>かぶくん育成ゲーム</title>

<h1>かぶくん育成ゲーム</h1>

<p>レベル: <span id="lv">1</span></p>

<button onclick="feed()">ごはん</button>

<script>
let lv = 1;

function feed() {
  lv++;
  document.getElementById("lv").innerText = lv;
}
</script>
